# Basic Azure DevOps Security Audit Pipeline
# This pipeline runs security audits on every push

trigger:
  - main
  - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  node-version: '20'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: $(node-version)
    displayName: 'Install Node.js'

  - script: |
      npm install -g pnpm
      pnpm install --frozen-lockfile
    displayName: 'Install Dependencies'

  - script: pnpm audit
    displayName: 'Security Audit'

  - script: echo "Security audit completed"
    displayName: 'Audit Complete'