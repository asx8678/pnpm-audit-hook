name: Update Vulnerability Database

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      force_full:
        description: Force full database rebuild (ignores last-updated timestamp)
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with full git history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66dd77 # v4.1.0
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install

      - name: Run database update
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.force_full == 'true' }}" = "true" ]; then
            echo "Force full update requested via workflow_dispatch"
            pnpm run update-vuln-db:full
          else
            echo "Running incremental update"
            pnpm run update-vuln-db:incremental
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy static DB to dist and optimize
        run: |
          node scripts/copy-static-db.js
          node scripts/optimize-static-db.js

      - name: Check for changes in tracked data files
        id: check_changes
        run: |
          # Only check package shard files — index.json always has a new timestamp even with no changes
          # Use pathspec to exclude index.json from the diff check
          if git diff --quiet -- 'src/static-db/data/' ':(exclude)src/static-db/data/index.json'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No meaningful vulnerability data changes detected"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Vulnerability data has changed - will create PR"
          fi

      - name: Extract database stats
        id: db_stats
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "packages=$(jq '.totalPackages' src/static-db/data/index.json)" >> "$GITHUB_OUTPUT"
          echo "vulnerabilities=$(jq '.totalVulnerabilities' src/static-db/data/index.json)" >> "$GITHUB_OUTPUT"
          echo "date=$(jq -r '.lastUpdated[:10]' src/static-db/data/index.json)" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@67ccf781d68cd99b980ae6aecbd6ed701abf9de4 # v6.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(db): update vulnerability database ${{ steps.db_stats.outputs.date }}"
          title: "chore(db): Update vulnerability database"
          body: |
            ## Vulnerability Database Update

            Automated weekly update of the static vulnerability database.

            | Metric           | Value                                 |
            |------------------|---------------------------------------|
            | **Date**         | ${{ steps.db_stats.outputs.date }}    |
            | **Packages**     | ${{ steps.db_stats.outputs.packages }} |
            | **Vulnerabilities** | ${{ steps.db_stats.outputs.vulnerabilities }} |

            > _Generated by [pnpm-audit-hook](https://github.com/asx8678/pnpm-audit-hook) weekly automation._
          branch: "chore/update-vuln-db-${{ steps.db_stats.outputs.date }}"
          base: main
          labels: automated, database, security
